name: Flutter CI/CD Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build and Verify Flutter App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Decode Client Secret
        env:
          CLIENT_SECRET_BASE64: ${{ secrets.CLIENT_SECRET_JSON_BASE64 }}
        run: |
          if [ -z "$CLIENT_SECRET_BASE64" ]; then
            echo "Error: CLIENT_SECRET_JSON_BASE64 secret is not set in GitHub Actions."
            exit 1
          fi
          
          echo "$CLIENT_SECRET_BASE64" | base64 --decode > client_secret.json
          
          if [ ! -s client_secret.json ]; then
            echo "Error: Decoded client_secret.json is empty or decoding failed."
            exit 1
          fi
          echo "Successfully decoded client_secret.json"

      - name: Install Dependencies
        run: flutter pub get

      - name: Analyze Code
        run: flutter analyze

      - name: Run Tests
        run: flutter test

      - name: Build Debug APK for Prototyping
        run: flutter build apk --debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mc_finance_prototype_apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14