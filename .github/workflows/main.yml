name: Flutter CI/CD Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build and Verify Flutter App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Analyze Code
        run: flutter analyze

      - name: Accept Android SDK & NDK Licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Build Release APK for Production
        run: flutter build apk --release

      - name: Upload Production APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mc_finance_production_apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30